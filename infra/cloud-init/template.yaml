#cloud-config
# Per-instance cloud-init template for GOTO 2026 student VPS.
# The placeholders (each wrapped in double braces below) are substituted by
# infra/clone.sh at create time, per host in instances.toml:
#   HOSTNAME, ANTHROPIC_API_KEY_B64, DESKTOP_USER, DESKTOP_PASS, TUNNEL_SALT,
#   CLOUDFLARED_TOKEN, POSTGRES_APP_PASSWORD, ELEVENLABS_VOICE_ID (per-box) and
#   the fleet-wide student keys OPENAI_API_KEY, ELEVENLABS_API_KEY, EXA_API_KEY,
#   FIRECRAWL_API_KEY, CODERABBIT_API_KEY, VSCODE_TUNNEL_GITHUB_TOKEN.
# TUNNEL_SALT and the fleet student keys are fleet-wide (one value for every box);
# CLOUDFLARED_TOKEN, POSTGRES_APP_PASSWORD, ANTHROPIC_API_KEY and ELEVENLABS_VOICE_ID
# are per-box. clone.sh reads each from its source (env, instance-secrets.toml,
# instances.toml) and substitutes them here.
#
# This is the ONLY per-instance layer. Everything else comes from the
# golden snapshot, so each box differs only by name + its injected secrets.
#
# Agent user (m5): this lab is Ubuntu-only. The agent user is the stock Ubuntu
# cloud-image `ubuntu` account, so the paths and `sudo -u` below hardcode
# `ubuntu` deliberately. bootstrap.sh pins AGENT_USER=ubuntu (no longer env-
# overridable) precisely so this cloud-init layer and the bake never disagree on
# who the agent user is. Supporting a different user would mean threading
# AGENT_USER through clone.sh into these placeholders too; out of scope here.

hostname: {{HOSTNAME}}
preserve_hostname: false

write_files:
  # Per-instance Anthropic API key, root-readable only, owned by the agent user.
  # Read per-box from instance-secrets.toml (billing isolation). base64-encoded
  # (M3): clone.sh emits the key as a single b64 line, so a key with embedded
  # newlines or leading YAML sigils (`{`, `|`, `>`) can never corrupt this block
  # or inject adjacent keys. cloud-init decodes it back to the raw key on the box.
  # clone.sh additionally rejects CR/LF in the key up front. Consumed by the
  # OpenClaw gateway for LLM API calls.
  - path: /home/ubuntu/.openclaw/credentials/api-key
    owner: ubuntu:ubuntu
    permissions: '0600'
    encoding: b64
    content: "{{ANTHROPIC_API_KEY_B64}}"

  # Fleet-wide student tool keys, sourced by the ubuntu user's ~/.zshenv so every
  # shell (and the tools they launch — claude, codex, skill scripts) sees them.
  # root:root 0640 keeps the file out of the home dir while staying ubuntu-readable.
  # These are the SAME value on every box (one shared account per tool). The
  # per-box ELEVENLABS_VOICE_ID pairs the shared ElevenLabs key with this box's
  # voice. VSCODE_TUNNEL_GITHUB_TOKEN is deliberately NOT here — it is operational
  # infra (tunnel pre-auth), consumed once by firstboot, not student tooling.
  - path: /etc/openclaw/student-keys.env
    owner: root:root
    permissions: '0640'
    content: |
      OPENAI_API_KEY="{{OPENAI_API_KEY}}"
      ELEVENLABS_API_KEY="{{ELEVENLABS_API_KEY}}"
      ELEVENLABS_VOICE_ID="{{ELEVENLABS_VOICE_ID}}"
      EXA_API_KEY="{{EXA_API_KEY}}"
      FIRECRAWL_API_KEY="{{FIRECRAWL_API_KEY}}"
      CODERABBIT_API_KEY="{{CODERABBIT_API_KEY}}"

  # Per-instance desktop basic-auth credential consumed at first boot by the
  # baked openclaw-desktop-cred.service (After=cloud-final), which turns it into
  # the nginx bcrypt htpasswd. Secret: root:root 0600. write_files runs in the
  # cloud-init config stage, well before cloud-final, so the file is present when
  # the cred unit fires. Absent => nginx fails closed (401); never baked into the
  # snapshot, only injected here per instance.
  - path: /etc/openclaw/desktop.env
    owner: root:root
    permissions: '0600'
    content: |
      DESKTOP_USER="{{DESKTOP_USER}}"
      DESKTOP_PASS="{{DESKTOP_PASS}}"

  # Cloudflare Tunnel secrets, consumed at first boot by the baked
  # openclaw-tunnel.service: TUNNEL_SALT seeds the per-box subdomain hash (see
  # openclaw-tunnel-config.sh), CLOUDFLARED_TOKEN authenticates the connector to
  # Cloudflare's edge. POSTGRES_APP_PASSWORD is injected now for a later loop that
  # wires the companion app's Postgres role. Secret: root:root 0600. Unlike the
  # desktop credential this file is NOT consumed/deleted — the connector reads the
  # token on every boot. All three are fleet-wide; never baked into the snapshot.
  - path: /etc/openclaw/tunnel.env
    owner: root:root
    permissions: '0600'
    content: |
      TUNNEL_SALT="{{TUNNEL_SALT}}"
      CLOUDFLARED_TOKEN="{{CLOUDFLARED_TOKEN}}"
      POSTGRES_APP_PASSWORD="{{POSTGRES_APP_PASSWORD}}"

  # VS Code Remote Tunnel name — a 24-char hex string derived from
  # sha256(hostname + TUNNEL_SALT + "vscode")[:24]. Not the hostname, not in DNS,
  # unguessable without both secrets. Consumed by openclaw-code-tunnel.service
  # via EnvironmentFile. Students reach VS Code at
  # https://vscode.dev/tunnel/$VSCODE_TUNNEL_NAME.
  - path: /etc/openclaw/vscode-tunnel-name
    owner: root:root
    permissions: '0640'
    content: |
      VSCODE_TUNNEL_NAME="{{VSCODE_TUNNEL_NAME}}"

  # Pull-at-boot helper: clones the masterclass repo (or fast-forwards if it
  # already exists) then runs goto2026-sync to apply current dotfiles, shell
  # niceties, mise toolchain config, and OpenClaw skills.
  #
  # Why here instead of rebaking: the golden image carries all the heavy system
  # packages (Docker, cloudflared, Node, openclaw). Lightweight changes — shell
  # config, student scripts, skill files — are cheaper to pull from the public
  # repo at first boot than to trigger a full 10-15 min rebake cycle. This
  # also validates the goto2026-sync mechanism we use for event-day live updates.
  #
  # The script is deliberately defensive: any failure logs to
  # /var/log/goto2026-pull-at-boot.log and exits 0 so cloud-init always
  # completes. A partial failure won't brick a student box.
  - path: /usr/local/sbin/goto2026-pull-at-boot.sh
    owner: root:root
    permissions: '0750'
    content: |
      #!/usr/bin/env bash
      # Clones or pulls the masterclass repo, then runs goto2026-sync.
      # Called by cloud-init runcmd on first boot. Safe to re-run.
      set -euo pipefail
      exec >> /var/log/goto2026-pull-at-boot.log 2>&1

      REPO=/opt/goto2026-masterclass
      REPO_URL=https://github.com/fluent-workshop/goto2026-masterclass.git

      echo "[pull-at-boot] $(date -u +%FT%TZ) — starting"

      if [[ -d "$REPO/.git" ]]; then
        echo "[pull-at-boot] repo exists — pulling latest"
        git -C "$REPO" pull --ff-only origin main
      else
        echo "[pull-at-boot] cloning $REPO_URL → $REPO"
        git clone --depth=1 "$REPO_URL" "$REPO"
      fi

      echo "[pull-at-boot] fixing ownership ubuntu:ubuntu"
      chown -R ubuntu:ubuntu "$REPO"

      echo "[pull-at-boot] running goto2026-sync"
      bash "$REPO/dotfiles/bin/goto2026-sync"

      echo "[pull-at-boot] done"

runcmd:
  # Make the hostname stick for prompts/support ("Pikachu is wedged").
  # Quoted so a hostname is never word-split or shell-interpreted here; clone.sh
  # additionally validates {{HOSTNAME}} against RFC 1123 before substitution (M2).
  - hostnamectl set-hostname "{{HOSTNAME}}"
  - sed -i "s/127.0.1.1.*/127.0.1.1 {{HOSTNAME}}/" /etc/hosts || true
  # Pull-at-boot: clone the masterclass repo and apply current dotfiles/skills.
  # Non-fatal (|| true) so a transient network hiccup never blocks cloud-init.
  # Logs to /var/log/goto2026-pull-at-boot.log for post-boot inspection.
  - /usr/local/sbin/goto2026-pull-at-boot.sh || true
  # VS Code Remote Tunnel: pre-authenticate the `code` CLI with the shared class
  # GitHub PAT, then enable+start the baked tunnel unit so the box is reachable at
  # https://vscode.dev/tunnel/{{HOSTNAME}} before class. The token is injected here
  # (never baked into the golden image). All three are non-fatal so a flaky network
  # or GitHub hiccup never blocks cloud-init.
  # VS Code tunnel: pre-auth with the shared class GitHub PAT, then enable the
  # baked service (which reads VSCODE_TUNNEL_NAME from vscode-tunnel-name above).
  - sudo -u ubuntu code tunnel user login --provider github --access-token "{{VSCODE_TUNNEL_GITHUB_TOKEN}}" || true
  - systemctl daemon-reload || true
  - systemctl enable openclaw-code-tunnel.service || true
  - systemctl start openclaw-code-tunnel.service || true
  # Sanity self-check on first boot. Keep `|| true` so a doctor failure never
  # blocks cloud-init, but capture its output for debugging instead of discarding
  # it (m3). The `|| true` runs the whole redirected command, so the log is always
  # written. Runs as `ubuntu` to match the bake's agent user (see note above).
  - sudo -u ubuntu openclaw doctor > /var/log/openclaw-doctor.log 2>&1 || true
  # Patch OpenClaw config: Anthropic + OpenAI models, Whisper CLI as primary STT,
  # ElevenLabs TTS with the per-box voice. Written here (not baked) because the
  # API keys and voice ID are per-instance secrets.
  - |
    ANTHROPIC_KEY="$(cat /home/ubuntu/.openclaw/credentials/api-key 2>/dev/null)"
    OPENAI_KEY="$(grep OPENAI_API_KEY /etc/openclaw/student-keys.env | cut -d'"' -f2)"
    ELABS_KEY="$(grep ELEVENLABS_API_KEY /etc/openclaw/student-keys.env | cut -d'"' -f2)"
    ELABS_VOICE="$(grep ELEVENLABS_VOICE_ID /etc/openclaw/student-keys.env | cut -d'"' -f2)"
    cat > /tmp/oc-config-patch.json << OCEOF
    {
      "models": {
        "providers": {
          "anthropic": {
            "apiKey": "$ANTHROPIC_KEY",
            "timeoutSeconds": 1200,
            "models": [
              {"id":"claude-haiku-4-5","name":"Claude Haiku 4.5","api":"anthropic-messages","contextWindow":200000,"maxTokens":64000,"input":["text","image"],"cost":{"input":1,"output":5,"cacheRead":0.1,"cacheWrite":1.25}},
              {"id":"claude-sonnet-4-6","name":"Claude Sonnet 4.6","api":"anthropic-messages","contextWindow":1000000,"maxTokens":128000,"reasoning":true,"input":["text","image"],"cost":{"input":3,"output":15,"cacheRead":0.3,"cacheWrite":3.75}},
              {"id":"claude-opus-4-8","name":"Claude Opus 4.8","api":"anthropic-messages","contextWindow":1000000,"maxTokens":128000,"reasoning":true,"input":["text","image"],"cost":{"input":5,"output":25,"cacheRead":0.5,"cacheWrite":6.25}}
            ]
          },
          "openai": {
            "apiKey": "$OPENAI_KEY",
            "baseUrl": "https://api.openai.com/v1",
            "api": "openai-completions",
            "timeoutSeconds": 1200,
            "models": [
              {"id":"gpt-5.1","name":"GPT-5.1","contextWindow":400000},
              {"id":"gpt-5.1-mini","name":"GPT-5.1 Mini","contextWindow":400000},
              {"id":"o1","name":"o1","reasoning":true,"contextWindow":200000}
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": {"primary": "anthropic/claude-sonnet-4-6", "fallbacks": ["anthropic/claude-haiku-4-5"]}
        }
      },
      "tools": {
        "media": {
          "audio": {
            "enabled": true,
            "timeoutSeconds": 120,
            "models": [
              {"type":"cli","command":"/usr/local/bin/whisper-transcribe","capabilities":["audio"]},
              {"provider":"openai","model":"whisper-1","capabilities":["audio"]}
            ]
          }
        }
      },
      "messages": {
        "tts": {
          "auto": "inbound",
          "provider": "elevenlabs",
          "modelOverrides": {"enabled": true, "allowVoice": true},
          "providers": {
            "elevenlabs": {
              "apiKey": "$ELABS_KEY",
              "modelId": "eleven_flash_v2_5",
              "voiceSettings": {"speed": 1.0},
              "speakerVoiceId": "$ELABS_VOICE"
            }
          }
        }
      }
    }
    OCEOF
    sudo -u ubuntu openclaw config patch --file /tmp/oc-config-patch.json >> /var/log/openclaw-doctor.log 2>&1 || true
    rm -f /tmp/oc-config-patch.json
